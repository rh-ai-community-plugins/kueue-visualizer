# --- Plugin identity (required) ---
name: kueue-visualizer                   # [PLUGIN-SPECIFIC] unique plugin identifier (kebab-case)
displayName: Kueue                   # [PLUGIN-SPECIFIC] human-readable name
description: Kueue queue visibility for the RHOAI Dashboard — queue topology, workload scheduling status, cohort borrowing, and resource flavor mapping.
version: 0.1.0

# --- Maintainer (required) ---
maintainer:                          # [PLUGIN-SPECIFIC]
  name: Robert Lundberg
  github: rlundber

# --- RHOAI compatibility (required) ---
rhoai_compatibility:
  min_version: "3.3.0"
  tested_versions: ["3.3.0", "3.4.0"]

# --- Deployment (required) ---
deployment_model: cluster-shared     # per-project | cluster-shared | both

image:                               # [PLUGIN-SPECIFIC]
  repository: quay.io/rh-ai-community-plugins/kueue-visualizer
  tag: "0.1.1"

# --- Installation (required) ---
install:
  method: automatic
  helm:
    chart_path: chart/
    registry: oci://quay.io/rh-ai-community-plugins/kueue-visualizer-chart
  prerequisites:
    - Kueue installed on the cluster
  instructions: https://github.com/rh-ai-community-plugins/kueue-visualizer/blob/main/README.md

# --- Dashboard integration (required) ---
remote:
  type: module-federation
  spec:
    name: kueuePlugin                # [PLUGIN-SPECIFIC] Module Federation container name (camelCase)
    scope: kueuePlugin               # [PLUGIN-SPECIFIC] must match name above
    # [PLUGIN-SPECIFIC] Update this URL to point to your deployed OpenShift route.
    remoteEntry: https://<your-openshift-route>/remoteEntry.js
    paths:
      - type: route
        path: /kueue                 # [PLUGIN-SPECIFIC] must match route prefix in extensions.ts
        extensions:
          - kueuePlugin/extensions   # [PLUGIN-SPECIFIC] {scope}/extensions
      - type: icon
        path: kueuePlugin/Icon       # [PLUGIN-SPECIFIC] {scope}/Icon

# --- RBAC (required) ---
rbac:
  required_roles: []
  cluster_roles: true               # ClusterRole for kueue.x-k8s.io resources

# --- Support (optional) ---
support:
  repo: https://github.com/rh-ai-community-plugins/kueue-visualizer
  docs: https://github.com/rh-ai-community-plugins/kueue-visualizer/blob/main/README.md
  issues: https://github.com/rh-ai-community-plugins/kueue-visualizer/issues

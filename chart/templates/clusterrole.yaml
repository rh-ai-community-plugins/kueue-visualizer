{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kueue-plugin.fullname" . }}-reader
rules:
  - apiGroups: ["kueue.x-k8s.io"]
    resources:
      - localqueues
      - clusterqueues
      - workloads
      - resourceflavors
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - namespaces
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kueue-plugin.fullname" . }}-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kueue-plugin.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "kueue-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

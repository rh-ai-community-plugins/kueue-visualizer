{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "kueue-plugin.fullname" . }}
spec:
  to:
    kind: Service
    name: {{ include "kueue-plugin.fullname" . }}
  port:
    targetPort: {{ .Values.service.targetPort }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}

image:
  repository: quay.io/rh-ai-community-plugins/kueue-plugin
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

route:
  enabled: true

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1001

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

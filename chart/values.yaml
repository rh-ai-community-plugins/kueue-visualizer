image:
  repository: quay.io/rh-ai-community-plugins/kueue-visualizer
  tag: ""
  pullPolicy: IfNotPresent

# Overrides .Chart.Name — keeps k8s resource names as kueue-visualizer despite chart being named kueue-visualizer-chart
nameOverride: "kueue-visualizer"
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

replicaCount: 1

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

route:
  enabled: true

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

securityContext:
  runAsNonRoot: true


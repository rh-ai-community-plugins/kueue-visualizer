server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow cross-origin fetch of remoteEntry.js for Module Federation
    location /remoteEntry.js {
        add_header Access-Control-Allow-Origin *;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
